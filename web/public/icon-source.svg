<?xml version="1.0" encoding="UTF-8"?>
<!--
  ColaApp PWA icon source (D-20 / Claude's discretion icon artwork).
  Trademark-safe GENERIC single-bottle silhouette, light glyph, on a solid #1A1D21 tile.
  NOT the Coca-Cola wordmark, dynamic-ribbon logo, or Coca-Cola red.
  viewBox is a 512 square; the bottle glyph is centered for full-bleed (192/512) renders.
  The maskable variant is produced by scaling this down into the ~80% safe zone at build.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#1A1D21"/>
  <g fill="#F4F5F7">
    <!-- Generic bottle silhouette: cap, neck, shoulders, body. Symmetric, no branding. -->
    <path d="
      M 232 96
      h 48
      a 8 8 0 0 1 8 8
      v 22
      h 6
      a 6 6 0 0 1 6 6
      v 18
      a 6 6 0 0 1 -6 6
      h -4
      c 0 26 14 40 22 60
      c 9 22 12 40 12 66
      v 118
      a 28 28 0 0 1 -28 28
      h -68
      a 28 28 0 0 1 -28 -28
      v -118
      c 0 -26 3 -44 12 -66
      c 8 -20 22 -34 22 -60
      h -4
      a 6 6 0 0 1 -6 -6
      v -18
      a 6 6 0 0 1 6 -6
      h 6
      v -22
      a 8 8 0 0 1 8 -8
      z
    "/>
    <!-- Subtle label band cutout (dark) to read as a bottle, not a vase. -->
    <rect x="206" y="300" width="100" height="54" rx="6" fill="#1A1D21"/>
  </g>
</svg>
